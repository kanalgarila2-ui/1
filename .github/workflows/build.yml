name: Build VerySchool APKs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Generate icons
        run: |
          python3 make_icons.py client 139 92 246
          python3 make_icons.py server 0 184 148

      - name: Decode google-services (client)
        env:
          GOOGLE_SERVICES_CLIENT: ${{ secrets.GOOGLE_SERVICES_CLIENT }}
        run: |
          if [ -n "$GOOGLE_SERVICES_CLIENT" ]; then
            echo "$GOOGLE_SERVICES_CLIENT" | base64 -d > client/app/google-services.json
          fi

      - name: Decode google-services (server)
        env:
          GOOGLE_SERVICES_SERVER: ${{ secrets.GOOGLE_SERVICES_SERVER }}
        run: |
          if [ -n "$GOOGLE_SERVICES_SERVER" ]; then
            echo "$GOOGLE_SERVICES_SERVER" | base64 -d > server/app/google-services.json
          fi

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > client/app/keystore.jks
          fi

      - name: Build Client APK (debug)
        run: gradle -p client clean assembleDebug --no-daemon --stacktrace
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASS:      ${{ secrets.KEY_PASS }}

      #- name: Build Client AAB (release)
       # if: github.ref == 'refs/heads/main'
        #run: gradle -p client bundleRelease --no-daemon
        #env:
         # KEYSTORE_PATH: keystore.jks
          #KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          #KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          #KEY_PASS:      ${{ secrets.KEY_PASS }}

      - name: Build Server APK (debug)
        run: gradle -p server clean assembleDebug --no-daemon --stacktrace

      - name: Upload Client APK
        uses: actions/upload-artifact@v4
        with:
          name: VerySchool-Client-APK
          path: |
            client/app/build/outputs/apk/debug/app-debug.apk
            client/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

      - name: Upload Server APK
        uses: actions/upload-artifact@v4
        with:
          name: VerySchool-Server-APK
          path: server/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
